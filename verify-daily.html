<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily riders — verify &amp; preview — Circle Quest</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  body { padding: 18px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 1.25rem; }
  .lede { font-size: .9rem; color: #6b6656; margin: 0 0 8px; }
  .ok { color: #0ea271; } .bad { color: #e64980; font-weight: 700; }
  #summary { font-size: 1.05rem; font-weight: 700; margin: 12px 0; padding: 12px 14px; border: 2px solid #252a4a; border-radius: 12px; }
  #summary.pass { border-color: #0ea271; background: #e8f8f1; }
  #summary.fail { border-color: #e64980; background: #fdeef4; }
  #fails .row { padding: 3px 0; }
  /* live try-it panel */
  #try { border: 2px solid #252a4a; border-radius: 14px; padding: 14px; background: #fff; margin: 14px 0 22px; }
  #try h2 { font-size: 1rem; margin: 0 0 8px; }
  #try select { font: 600 .9rem "Instrument Sans", sans-serif; padding: 7px 10px; border-radius: 10px; border: 2px solid #252a4a; background: #fff; }
  #tryHost { margin-top: 12px; max-width: 460px; }
  #tryScore { margin-top: 10px; font-weight: 800; font-size: .9rem; }
  /* gallery */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-top: 14px; }
  .vcard { border: 1.5px solid #e4ddcb; border-radius: 14px; padding: 12px 14px; background: #fff; }
  .vcard.err { border-color: #e64980; box-shadow: 0 0 0 2px #fbdbe8; }
  .tag { display: inline-block; font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .tag.multi { background: #e7edff; color: #2140a8; } .tag.single { background: #fff0e0; color: #9a4a05; }
  .qid { color: #8a8676; font-size: .72rem; font-weight: 700; float: right; }
  .vprompt { font-weight: 700; font-size: .95rem; margin: 2px 0 8px; }
  .vcard svg.diag { width: 100%; max-width: 300px; height: auto; display: block; margin: 0 auto 8px; }
  .val { font-weight: 800; }
  .ans { font-size: .88rem; margin: 4px 0; }
  .chain { list-style: none; padding: 0; margin: 6px 0 0; border-top: 1.5px dashed rgba(37,42,74,.2); padding-top: 6px; }
  .chain li { display: flex; justify-content: space-between; gap: 8px; font-size: .82rem; padding: 1px 0; }
  .chain .r { color: #8a8676; font-style: italic; text-align: right; flex: none; max-width: 55%; }
  .reasons { font-size: .8rem; margin-top: 6px; }
  .reasons .c { color: #0ea271; font-weight: 700; }
  .vcheck { font-size: .74rem; margin-top: 6px; color: #0ea271; }
  .vcheck.bad { color: #e64980; font-weight: 700; }
</style>
</head>
<body>
<h1>Daily riders — verify &amp; preview</h1>
<p class="lede">Every marked angle is measured from the drawn coordinates and compared to its declared value — green means the picture matches the maths. Pick a question below to actually <b>answer it</b> the way a learner will, then scroll for the full gallery.</p>
<div id="summary">Running…</div>
<div id="fails"></div>

<div id="try">
  <h2>Try one 👇</h2>
  <select id="pick"></select>
  <div id="tryHost"></div>
  <div id="tryScore"></div>
</div>

<div id="grid" class="grid"></div>

<script type="module">
import { verifyDiagram, renderDiagram } from "./js/engine.js";
import { DAILY_RIDERS } from "./js/rounds/index.js";
import { tx, reason, t } from "./js/i18n.js";
import { mountQuestion } from "./js/questions.js";

let angles = 0, fails = [];
const grid = document.getElementById("grid");

/* ---------- live "try it" panel ---------- */
const pick = document.getElementById("pick");
const tryHost = document.getElementById("tryHost");
const tryScore = document.getElementById("tryScore");
DAILY_RIDERS.forEach((e, i) => {
  const o = document.createElement("option");
  o.value = i;
  o.textContent = `${e.q.type === "num" ? "multi" : "single"} · ${e.q.id} · ${tx(e.q.prompt).slice(0, 58)}…`;
  pick.appendChild(o);
});
function mountTry() {
  const q = DAILY_RIDERS[pick.value].q;
  tryScore.textContent = "";
  tryHost.innerHTML = "";
  mountQuestion(tryHost, q, (isCorrect, score) => {
    const s = (score == null) ? (isCorrect ? 1 : 0) : score;
    tryScore.innerHTML = `Scored <span class="${s >= 1 ? "ok" : "bad"}">${s}</span> / 1 &nbsp;·&nbsp; correct answer is <b>${q.value}°</b>`;
  });
}
pick.addEventListener("change", mountTry);

/* ---------- verification + gallery ---------- */
DAILY_RIDERS.forEach(entry => {
  const q = entry.q;
  const res = verifyDiagram(q.diagram);
  const bad = res.filter(r => !r.ok);
  res.forEach(r => { angles++; if (!r.ok) fails.push({ label: q.id, ...r }); });

  const card = document.createElement("div");
  card.className = "vcard" + (bad.length ? " err" : "");
  const multi = q.type === "num";
  let html = `<span class="tag ${multi ? "multi" : "single"}">${multi ? "multi-step · type angle" : "single · type + reason"}</span>`
    + `<span class="qid">${q.id}</span>`
    + `<div class="vprompt">${tx(q.prompt)}</div>`
    + renderDiagram(q.diagram, q.accent || "#4263eb")
    + `<div class="ans"><span class="val">Answer: ${q.value}°</span> — ${tx(q.answer)}</div>`;
  if (q.solution && q.solution.length) {
    html += `<ul class="chain">` + q.solution.map(st =>
      `<li><span>${tx(st.s)}</span><span class="r">${st.r ? reason(st.r) : ""}</span></li>`).join("") + `</ul>`;
  }
  if (q.reasonOptions) {
    html += `<div class="reasons">Reasons: ` + q.reasonOptions.map(o =>
      o.correct ? `<span class="c">${reason(o.code)} ✓</span>` : reason(o.code)).join(" · ") + `</div>`;
  }
  html += bad.length
    ? `<div class="vcheck bad">✗ ${bad.map(b => `${b.t || "?"}@${b.at}: drawn ${b.drawn}° vs ${b.v}°`).join("; ")}</div>`
    : `<div class="vcheck">✓ all ${res.length} marked angle(s) to scale</div>`;
  card.innerHTML = html;
  grid.appendChild(card);
});

const summary = document.getElementById("summary");
const nMulti = DAILY_RIDERS.filter(e => e.q.type === "num").length;
const nSingle = DAILY_RIDERS.length - nMulti;
if (fails.length === 0) {
  summary.className = "pass";
  summary.innerHTML = `<span class="ok">✓ ALL TO SCALE — ${DAILY_RIDERS.length} riders (${nMulti} multi-step, ${nSingle} single-step), ${angles} angles checked, 0 mismatches.</span>`;
} else {
  summary.className = "fail";
  summary.innerHTML = `<span class="bad">✗ ${fails.length} mismatch(es) across ${DAILY_RIDERS.length} riders.</span>`;
  const fb = document.getElementById("fails");
  fails.forEach(f => {
    const d = document.createElement("div");
    d.className = "row bad";
    d.textContent = `${f.label}: "${f.t || "(unlabelled)"}" at ${f.at} — drawn ${f.drawn}°, declared ${f.v}° (Δ ${f.diff}°)`;
    fb.appendChild(d);
  });
}
mountTry();
window.__VERIFY__ = { count: DAILY_RIDERS.length, multi: nMulti, single: nSingle, angles, fails };
console.log("VERIFY_DAILY", JSON.stringify(window.__VERIFY__));
</script>
</body>
</html>
